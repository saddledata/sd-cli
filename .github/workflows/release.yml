name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Update Major Tag
        shell: bash
        run: |
          # Extract major version (e.g. v0 from v0.1.7)
          TAG=${{ github.ref_name }}
          MAJOR=${TAG%%.*}
          
          # Only update if it's a semantic version tag (v0, v1, etc.)
          if [[ $MAJOR =~ ^v[0-9]+$ ]]; then
            echo "Updating floating tag $MAJOR to $TAG..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -fa "$MAJOR" -m "Update $MAJOR tag to $TAG"
            git push origin "$MAJOR" --force
          fi
